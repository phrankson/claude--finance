<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" width="900" height="320" role="img" aria-label="AI Personal Finance Advisor">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c1220"/>
      <stop offset="100%" stop-color="#1a2840"/>
    </linearGradient>
    <linearGradient id="goldBar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4c668"/>
      <stop offset="100%" stop-color="#e8a838"/>
    </linearGradient>
    <style>
      .title { font-family: 'Helvetica Neue', Arial, sans-serif; font-weight: 800; font-size: 36px; letter-spacing: 1px; fill: #e8a838; }
      .subtitle { font-family: 'Helvetica Neue', Arial, sans-serif; font-weight: 700; font-size: 26px; letter-spacing: 2px; fill: #2d8a4e; }
      .tagline { font-family: 'Helvetica Neue', Arial, sans-serif; font-weight: 500; font-size: 14px; fill: #b8c5d6; letter-spacing: 0.3px; }
      .badge { font-family: 'Helvetica Neue', Arial, sans-serif; font-weight: 700; font-size: 11px; fill: #0c1220; letter-spacing: 0.5px; }
      .feature { font-family: 'Helvetica Neue', Arial, sans-serif; font-weight: 500; font-size: 13px; fill: #e8eef7; }
      .cmd { font-family: 'SF Mono', Menlo, Consolas, monospace; font-weight: 600; font-size: 11px; fill: #4a9eff; }
      .footer { font-family: 'Helvetica Neue', Arial, sans-serif; font-weight: 500; font-size: 11px; fill: #8aa0bf; letter-spacing: 0.4px; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="320" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.05" stroke="#4a9eff" stroke-width="1">
    <line x1="0" y1="80" x2="900" y2="80"/>
    <line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="0" y1="240" x2="900" y2="240"/>
  </g>

  <!-- LEFT COLUMN -->
  <!-- Gold vertical accent bar -->
  <rect x="32" y="34" width="5" height="120" rx="2.5" fill="url(#goldBar)"/>

  <!-- Title -->
  <text x="54" y="68" class="title">AI PERSONAL FINANCE</text>
  <text x="54" y="100" class="subtitle">ADVISOR</text>

  <!-- Tagline -->
  <text x="54" y="128" class="tagline">AI-Powered Financial Planning &amp; Analysis</text>

  <!-- Stat badges -->
  <g>
    <rect x="54" y="150" width="92" height="26" rx="13" fill="#e8a838"/>
    <text x="100" y="167" class="badge" text-anchor="middle">14 SKILLS</text>

    <rect x="154" y="150" width="92" height="26" rx="13" fill="#2d8a4e"/>
    <text x="200" y="167" class="badge" text-anchor="middle" fill="#ffffff">5 AGENTS</text>

    <rect x="254" y="150" width="108" height="26" rx="13" fill="#4a9eff"/>
    <text x="308" y="167" class="badge" text-anchor="middle" fill="#0c1220">PDF REPORTS</text>
  </g>

  <!-- RIGHT COLUMN: feature checklist -->
  <g transform="translate(620, 50)">
    <text x="120" y="0" class="feature" font-weight="700" fill="#e8a838" font-size="13" letter-spacing="0.8" text-anchor="middle">WHAT IT COVERS</text>

    <!-- 6 bullets -->
    <g transform="translate(0, 28)">
      <circle cx="6" cy="6" r="4" fill="#e8a838"/>
      <text x="20" y="10" class="feature">Cash Flow &amp; Budgeting</text>
    </g>
    <g transform="translate(0, 52)">
      <circle cx="6" cy="6" r="4" fill="#e8a838"/>
      <text x="20" y="10" class="feature">Debt Payoff Strategy</text>
    </g>
    <g transform="translate(0, 76)">
      <circle cx="6" cy="6" r="4" fill="#e8a838"/>
      <text x="20" y="10" class="feature">Retirement Planning</text>
    </g>
    <g transform="translate(0, 100)">
      <circle cx="6" cy="6" r="4" fill="#e8a838"/>
      <text x="20" y="10" class="feature">FIRE Calculator</text>
    </g>
    <g transform="translate(0, 124)">
      <circle cx="6" cy="6" r="4" fill="#e8a838"/>
      <text x="20" y="10" class="feature">Tax Optimization</text>
    </g>
  </g>

  <!-- Divider -->
  <line x1="54" y1="200" x2="846" y2="200" stroke="#2a3a55" stroke-width="1"/>

  <!-- Command previews: 2 rows of 3 -->
  <g transform="translate(54, 222)">
    <!-- Row 1 -->
    <rect x="0" y="0" width="240" height="22" rx="4" fill="#142036" stroke="#2a3a55"/>
    <text x="10" y="15" class="cmd">/finance &#8594; full plan + PDF</text>

    <rect x="256" y="0" width="240" height="22" rx="4" fill="#142036" stroke="#2a3a55"/>
    <text x="266" y="15" class="cmd">/finance-quick &#8594; 60s snapshot</text>

    <rect x="512" y="0" width="280" height="22" rx="4" fill="#142036" stroke="#2a3a55"/>
    <text x="522" y="15" class="cmd">/finance-retirement &#8594; projections</text>

    <!-- Row 2 -->
    <rect x="0" y="30" width="240" height="22" rx="4" fill="#142036" stroke="#2a3a55"/>
    <text x="10" y="45" class="cmd">/finance-debt &#8594; payoff plan</text>

    <rect x="256" y="30" width="240" height="22" rx="4" fill="#142036" stroke="#2a3a55"/>
    <text x="266" y="45" class="cmd">/finance-fire &#8594; FIRE number</text>

    <rect x="512" y="30" width="280" height="22" rx="4" fill="#142036" stroke="#2a3a55"/>
    <text x="522" y="45" class="cmd">/finance-taxes &#8594; tax savings</text>
  </g>

  <!-- Bottom bar: life stages -->
  <rect x="0" y="290" width="900" height="30" fill="#070b14"/>
  <text x="450" y="310" class="footer" text-anchor="middle">EARLY CAREER  •  FAMILY PLANNING  •  WEALTH BUILDING  •  PRE-RETIREMENT  •  RETIREMENT  •  LEGACY</text>
</svg>
